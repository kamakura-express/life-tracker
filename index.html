<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="整理">
<meta name="theme-color" content="#131313">
<title>整理 · 記帳與生活</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --ink: #131313;
    --paper: #FFFFFF;
    --paper-2: #F4F4F2;
    --red: #E1362F;
    --yellow: #FFD23F;
    --line: #131313;
    --soft: #6b6b6b;
  }

  *{ box-sizing: border-box; }

  body{
    margin:0;
    background: var(--paper-2);
    background-image:
      radial-gradient(circle, rgba(19,19,19,0.14) 1.1px, transparent 1.1px);
    background-size: 10px 10px;
    color: var(--ink);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    padding: 22px 14px 60px;
  }

  .app{
    max-width: 480px;
    margin: 0 auto;
  }

  header{
    text-align:center;
    margin-bottom: 30px;
    position: relative;
  }

  header .banner{
    display:inline-block;
    position:relative;
    padding: 8px 30px;
    background: var(--ink);
    transform: skew(-8deg) rotate(-1.5deg);
    box-shadow: 5px 5px 0 var(--red);
  }

  header h1{
    font-weight: 900;
    font-size: 26px;
    margin: 0;
    letter-spacing: 6px;
    color: #fff;
    display:inline-block;
    transform: skew(8deg) rotate(1.5deg);
  }

  header .sub{
    font-size: 12px;
    color: var(--soft);
    letter-spacing: 1px;
    margin-top: 14px;
    font-weight: 500;
  }

  header .sub::before, header .sub::after{
    content: "★";
    color: var(--red);
    margin: 0 6px;
    font-size: 9px;
    vertical-align: middle;
  }

  .card{
    background: var(--paper);
    border: 3px solid var(--ink);
    border-radius: 4px;
    padding: 20px;
    margin-bottom: 26px;
    box-shadow: 6px 6px 0 var(--ink);
    position: relative;
  }

  .card:nth-of-type(odd){ transform: rotate(-0.4deg); }
  .card:nth-of-type(even){ transform: rotate(0.4deg); }

  .card::after{
    content:"";
    position:absolute;
    top: -3px; right: -3px;
    width: 0; height: 0;
    border-style: solid;
    border-width: 0 22px 22px 0;
    border-color: transparent var(--yellow) transparent transparent;
  }

  .section-title{
    font-size: 15px;
    font-weight: 900;
    margin: 0 0 16px;
    display:flex;
    align-items:center;
    gap: 9px;
    color: var(--ink);
    letter-spacing: 1px;
  }

  .section-title .dot{
    width:0; height:0;
    border-left: 6px solid transparent;
    border-right: 6px solid transparent;
    border-bottom: 10px solid var(--red);
    display:inline-block;
    transform: rotate(90deg);
  }

  .fixed-pins{
    margin-top: 8px;
    display:flex;
    flex-direction:column;
    gap: 5px;
  }
  .fixed-pins:empty{ display:none; }

  .fixed-pin{
    background: var(--yellow);
    border: 2px solid var(--ink);
    border-radius: 4px;
    padding: 3px 7px;
    font-size: 11px;
    font-weight: 900;
    color: var(--ink);
    cursor:pointer;
    box-shadow: 2px 2px 0 var(--ink);
    transition: transform .12s ease, box-shadow .12s ease;
    white-space: nowrap;
  }
  .fixed-pin .amt{ color: var(--red); margin-left: 3px; }
  .fixed-pin:hover{ transform: translate(-1px,-1px); box-shadow: 3px 3px 0 var(--ink); }
  .fixed-pin:active{ transform: translate(1px,1px); box-shadow: 1px 1px 0 var(--ink); }

  /* Quick record buttons */
  .quick-grid{
    display:flex;
    gap: 10px;
  }

  .cat-btn{
    flex:1;
    background: var(--paper);
    border: 2.5px solid var(--ink);
    border-radius: 6px;
    padding: 16px 6px;
    text-align:center;
    cursor:pointer;
    transition: transform .12s ease, background .12s ease, color .12s ease;
    color: var(--ink);
    font-size: 14px;
    font-weight: 700;
    box-shadow: 3px 3px 0 var(--ink);
  }
  .cat-btn:hover{
    transform: translate(-2px,-2px);
    box-shadow: 5px 5px 0 var(--ink);
    background: var(--ink);
    color: #fff;
  }
  .cat-btn:hover svg{ stroke: #fff !important; }
  .cat-btn:active{
    transform: translate(1px,1px);
    box-shadow: 2px 2px 0 var(--ink);
  }

  .cat-btn svg{ width: 32px; height: 32px; display:block; margin: 0 auto 8px; transition: stroke .12s ease; }

  /* Amount panel */
  .amount-panel{
    display:none;
    margin-top: 18px;
    background: var(--paper-2);
    border: 2.5px dashed var(--ink);
    border-radius: 6px;
    padding: 16px;
  }
  .amount-panel.show{ display:block; }

  .amount-panel .row{
    display:flex;
    align-items:center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .amount-panel .currency{
    font-size: 24px;
    font-weight: 900;
    color: var(--red);
  }

  .amount-panel input[type="number"]{
    flex:1;
    font-size: 24px;
    font-weight: 900;
    font-family:'Noto Sans TC', sans-serif;
    border: none;
    border-bottom: 3px solid var(--ink);
    background: transparent;
    padding: 4px 2px;
    color: var(--ink);
    outline:none;
  }

  .amount-panel input[type="text"]{
    width:100%;
    font-size: 13px;
    font-family:'Noto Sans TC', sans-serif;
    font-weight: 500;
    border: none;
    border-bottom: 2px dotted var(--ink);
    background: transparent;
    padding: 6px 2px;
    color: var(--ink);
    outline:none;
    margin-bottom: 14px;
  }

  .date-row{
    display:flex;
    align-items:center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .date-label{
    font-size: 12px;
    font-weight: 900;
    color: var(--soft);
  }
  .amount-panel input[type="date"]{
    font-size: 13px;
    font-weight: 700;
    font-family:'Noto Sans TC', sans-serif;
    border: 2px solid var(--ink);
    border-radius: 4px;
    background: var(--paper);
    padding: 5px 8px;
    color: var(--ink);
    outline:none;
  }

  .chip-row{
    display:flex;
    flex-wrap:wrap;
    gap: 8px;
    margin-bottom: 14px;
  }

  .chip{
    background: var(--paper);
    border: 2px solid var(--ink);
    border-radius: 20px;
    padding: 5px 13px;
    font-size: 12.5px;
    font-weight: 700;
    color: var(--ink);
    cursor:pointer;
    transition: background .12s ease, color .12s ease;
  }
  .chip:hover{
    background: var(--yellow);
  }
  .chip.active{
    background: var(--ink);
    color: #fff;
    border-color: var(--ink);
  }

  .btn-row{ display:flex; gap: 10px; }

  .btn{
    border: 2.5px solid var(--ink);
    border-radius: 6px;
    padding: 10px 16px;
    font-family:'Noto Sans TC', sans-serif;
    font-size: 14px;
    font-weight: 900;
    cursor:pointer;
    transition: transform .12s ease, box-shadow .12s ease;
  }

  .btn-save{
    background: var(--red);
    color: #fff;
    border-color: var(--ink);
    flex:1;
    box-shadow: 3px 3px 0 var(--ink);
  }
  .btn-save:hover{ transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--ink); }
  .btn-save:active{ transform: translate(1px,1px); box-shadow: 1px 1px 0 var(--ink); }

  .btn-cancel{
    background: var(--paper);
    color: var(--ink);
  }

  .toast{
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(20px) rotate(-1deg);
    background: var(--ink);
    color: #fff;
    padding: 10px 22px;
    border-radius: 4px;
    font-size: 13px;
    font-weight: 700;
    opacity:0;
    transition: all .3s ease;
    pointer-events:none;
    white-space:nowrap;
    border: 2px solid var(--red);
  }
  .toast.show{ opacity:1; transform: translateX(-50%) translateY(0) rotate(-1deg); }

  .month-nav{
    display:flex;
    align-items:center;
    gap: 12px;
    margin-bottom: 6px;
  }
  .nav-arrow{
    cursor:pointer;
    font-size: 13px;
    font-weight: 900;
    width: 26px; height: 26px;
    display:flex;
    align-items:center;
    justify-content:center;
    border: 2px solid var(--ink);
    border-radius: 4px;
    background: var(--paper);
    box-shadow: 2px 2px 0 var(--ink);
    user-select:none;
  }
  .nav-arrow:active{ transform: translate(1px,1px); box-shadow: 1px 1px 0 var(--ink); }
  .nav-arrow.disabled{
    opacity: .3;
    pointer-events: none;
  }
  .nav-current{
    font-size: 13px;
    font-weight: 700;
    color: var(--soft);
  }

  /* Dashboard */
  .month-total-wrap{
    position: relative;
    display:inline-block;
    margin: 4px 0 20px;
  }

  .month-total-wrap .burst{
    position:absolute;
    top: 50%; left: 14px;
    transform: translateY(-50%);
    width: 90px; height: 90px;
    background:
      repeating-conic-gradient(var(--yellow) 0deg 11.25deg, transparent 11.25deg 22.5deg);
    border-radius: 50%;
    z-index: 0;
    opacity: .9;
  }

  .month-total{
    font-size: 38px;
    font-weight: 900;
    position: relative;
    z-index: 1;
    padding-left: 14px;
  }
  .month-total .unit{ font-size: 15px; font-weight: 700; color: var(--ink); margin-left: 4px;}

  .bars{
    display:flex;
    align-items:flex-end;
    gap: 18px;
    height: 110px;
    margin-bottom: 10px;
    padding: 0 6px;
  }

  .bar-col{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-end;
    height:100%;
  }

  .bar{
    width: 100%;
    max-width: 46px;
    border: 2.5px solid var(--ink);
    border-radius: 3px 3px 0 0;
    transition: height .4s ease;
    min-height: 6px;
  }
  .bar.food{ background: var(--ink); }
  .bar.transport{
    background-image: repeating-linear-gradient(45deg, var(--ink) 0 4px, var(--paper) 4px 8px);
  }
  .bar.other{ background: var(--red); }

  .bar-label{
    font-size: 12px;
    font-weight: 700;
    color: var(--ink);
    margin-top: 8px;
    text-align:center;
  }
  .bar-amount{
    font-size: 11px;
    color: var(--soft);
    margin-top: 2px;
    font-weight: 500;
  }

  .empty-note{
    font-size: 13px;
    color: var(--soft);
    text-align:center;
    padding: 20px 10px;
    line-height:1.6;
    font-weight: 500;
  }

  /* Weekly log */
  .log-input-row{
    display:flex;
    gap: 8px;
    margin-bottom: 18px;
  }
  .log-input-row input{
    flex:1;
    font-size: 14px;
    font-family:'Noto Sans TC', sans-serif;
    font-weight: 500;
    border: none;
    border-bottom: 3px solid var(--ink);
    background: transparent;
    padding: 8px 4px;
    color: var(--ink);
    outline:none;
  }
  .log-input-row button{
    background: var(--ink);
    color: #fff;
    border: 2.5px solid var(--ink);
    border-radius: 6px;
    padding: 0 18px;
    font-size: 14px;
    font-weight: 900;
    cursor:pointer;
    box-shadow: 3px 3px 0 var(--red);
  }
  .log-input-row button:active{ transform: translate(1px,1px); box-shadow: 1px 1px 0 var(--red); }

  .log-list{
    list-style:none;
    margin:0; padding:0;
    display:flex;
    flex-direction:column;
    gap: 10px;
  }

  .log-item{
    background: var(--paper-2);
    border: 2px solid var(--ink);
    border-radius: 4px;
    padding: 12px 14px;
    font-size: 13px;
    font-weight: 500;
    position:relative;
    border-left: 6px solid var(--red);
  }
  .log-item .log-date{
    font-size: 11px;
    color: var(--soft);
    margin-bottom: 4px;
    font-weight: 700;
  }
  .log-item .log-del{
    position:absolute;
    top:8px; right:10px;
    cursor:pointer;
    color: var(--soft);
    font-size: 12px;
    font-weight: 700;
    opacity:.55;
  }
  .log-item .log-del:hover{ opacity:1; color: var(--red); }

  .past-toggle{
    margin-top: 12px;
    text-align:center;
    font-size: 12px;
    font-weight: 700;
    color: var(--soft);
    cursor:pointer;
    border-top: 2px dashed var(--ink);
    padding-top: 10px;
  }
  .past-toggle:hover{ color: var(--red); }
  .past-list{ margin-top: 10px; }

  .upcoming-item{
    display:flex;
    align-items:flex-start;
    gap: 10px;
  }

  .upcoming-check{
    flex-shrink:0;
    width: 20px; height: 20px;
    border: 2.5px solid var(--ink);
    border-radius: 4px;
    margin-top: 1px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    background: var(--paper);
  }
  .upcoming-check.checked{
    background: var(--red);
  }
  .upcoming-check.checked::after{
    content:"✓";
    color:#fff;
    font-size: 13px;
    font-weight: 900;
  }

  .upcoming-text{ flex:1; }
  .upcoming-body{ flex:1; }
  .upcoming-text.done{
    text-decoration: line-through;
    color: var(--soft);
  }

  .loading-hint{
    text-align:center;
    color: var(--soft);
    font-size: 12px;
    padding: 10px;
  }
</style>
</head>
<body>

<div class="app">
  <header>
    <div class="banner"><h1>整理</h1></div>
    <div class="sub" id="todayLabel"></div>
  </header>

  <!-- Quick record -->
  <div class="card">
    <div class="section-title"><span class="dot"></span>記一筆</div>

    <div class="quick-grid">
      <div class="cat-btn food" data-cat="食" onclick="openAmountPanel('食')">
        <svg viewBox="0 0 40 40" fill="none" stroke="#131313" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 6 C10 12, 10 16, 12 20 M12 6 L12 34 M9 6 L9 14 M15 6 L15 14"/>
          <path d="M27 6 C24 10, 23 16, 26 20 C28 22, 28 30, 27 34 C27 26, 25 22, 25 20"/>
        </svg>
        <div>食</div>
        <div class="fixed-pins" data-fixed-for="食"></div>
      </div>
      <div class="cat-btn transport" data-cat="行" onclick="openAmountPanel('行')">
        <svg viewBox="0 0 40 40" fill="none" stroke="#131313" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <rect x="8" y="12" width="24" height="16" rx="4"/>
          <path d="M8 20 h24"/>
          <circle cx="14" cy="30" r="2.5"/>
          <circle cx="26" cy="30" r="2.5"/>
          <path d="M11 12 L14 6 h12 l3 6"/>
        </svg>
        <div>行</div>
        <div class="fixed-pins" data-fixed-for="行"></div>
      </div>
      <div class="cat-btn other" data-cat="其他" onclick="openAmountPanel('其他')">
        <svg viewBox="0 0 40 40" fill="none" stroke="#131313" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 8 C11 8, 8 15, 8 20 C8 28, 14 33, 20 33 C26 33, 32 28, 32 20 C32 15, 29 8, 20 8 Z"/>
          <path d="M20 15 v10 M20 27 v.5"/>
        </svg>
        <div>其他</div>
        <div class="fixed-pins" data-fixed-for="其他"></div>
      </div>
    </div>

    <div class="amount-panel" id="amountPanel">
      <div class="row">
        <span class="currency">$</span>
        <input type="number" id="amountInput" placeholder="0" inputmode="decimal">
      </div>
      <div class="date-row">
        <span class="date-label">日期</span>
        <input type="date" id="dateInput">
      </div>
      <input type="text" id="noteInput" placeholder="備註(選填,例如：奶茶、地鐵)">
      <div class="chip-row" id="chipRow"></div>
      <div class="btn-row">
        <button class="btn btn-save" onclick="saveExpense()">記低</button>
        <button class="btn btn-cancel" onclick="closeAmountPanel()">算了</button>
      </div>
    </div>
  </div>

  <!-- Dashboard -->
  <div class="card">
    <div class="section-title"><span class="dot"></span><span id="monthNavLabel">呢個月</span></div>
    <div class="month-nav">
      <span class="nav-arrow" onclick="changeMonth(-1)">◀</span>
      <span class="nav-current" id="monthNavCurrent"></span>
      <span class="nav-arrow" id="nextArrow" onclick="changeMonth(1)">▶</span>
    </div>
    <div class="month-total-wrap">
      <div class="burst"></div>
      <div class="month-total"><span id="monthTotal">0</span><span class="unit">元</span></div>
    </div>
    <div class="bars" id="barsWrap">
      <div class="bar-col">
        <div class="bar food" id="barFood" style="height:6px;"></div>
        <div class="bar-label">食</div>
        <div class="bar-amount" id="amtFood">0</div>
      </div>
      <div class="bar-col">
        <div class="bar transport" id="barTransport" style="height:6px;"></div>
        <div class="bar-label">行</div>
        <div class="bar-amount" id="amtTransport">0</div>
      </div>
      <div class="bar-col">
        <div class="bar other" id="barOther" style="height:6px;"></div>
        <div class="bar-label">其他</div>
        <div class="bar-amount" id="amtOther">0</div>
      </div>
    </div>
  </div>

  <!-- Weekly free log -->
  <div class="card">
    <div class="section-title"><span class="dot"></span>呢排做過乜</div>
    <div class="log-input-row">
      <input type="text" id="logInput" placeholder="隨手寫低,例如：完成咗開團 / 睇咗場戲">
      <button onclick="addLog()">記低</button>
    </div>
    <ul class="log-list" id="logList"></ul>
    <div class="empty-note" id="logEmpty" style="display:none;">仲未有記錄,寫低今日發生咗乜就得</div>
    <div class="past-toggle" id="pastToggle" onclick="togglePastLog()" style="display:none;"></div>
    <ul class="log-list past-list" id="pastLogList" style="display:none;"></ul>
  </div>

  <!-- Upcoming / to-do -->
  <div class="card">
    <div class="section-title"><span class="dot"></span>黎緊想做嘅嘢</div>
    <div class="log-input-row">
      <input type="text" id="upcomingInput" placeholder="寫低諗住做嘅事">
      <button onclick="addUpcoming()">記低</button>
    </div>
    <ul class="log-list" id="upcomingList"></ul>
    <div class="empty-note" id="upcomingEmpty" style="display:none;">仲未有諗住做嘅嘢</div>
    <div class="past-toggle" id="upcomingPastToggle" onclick="toggleUpcomingPast()" style="display:none;"></div>
    <ul class="log-list past-list" id="upcomingPastList" style="display:none;"></ul>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const EXPENSES_KEY = 'expenses-v1';
  const LOG_KEY = 'life-log-v1';
  const UPCOMING_KEY = 'upcoming-v1';

  let expenses = [];
  let logs = [];
  let upcoming = [];
  let currentCat = null;
  let monthOffset = 0;

  const todayLabelEl = document.getElementById('todayLabel');
  const dateFmt = new Intl.DateTimeFormat('zh-Hant', { year:'numeric', month:'long', day:'numeric', weekday:'long' });
  todayLabelEl.textContent = dateFmt.format(new Date());

  const hasClaudeStorage = () => (typeof window.storage !== 'undefined' && window.storage && typeof window.storage.get === 'function');

  async function storeGet(key){
    if(hasClaudeStorage()){
      try{
        const r = await window.storage.get(key, false);
        return r && r.value ? r.value : null;
      }catch(e){ return null; }
    }
    return localStorage.getItem(key);
  }

  async function storeSet(key, value){
    if(hasClaudeStorage()){
      try{ await window.storage.set(key, value, false); }
      catch(e){ console.error('claude storage set failed', e); }
      return;
    }
    try{ localStorage.setItem(key, value); }
    catch(e){ console.error('localStorage set failed', e); }
  }

  async function loadData(){
    expenses = JSON.parse((await storeGet(EXPENSES_KEY)) || '[]');
    logs = JSON.parse((await storeGet(LOG_KEY)) || '[]');
    upcoming = JSON.parse((await storeGet(UPCOMING_KEY)) || '[]');

    renderDashboard();
    renderLog();
    renderFixedRow();
    renderUpcoming();
  }

  async function persistExpenses(){ await storeSet(EXPENSES_KEY, JSON.stringify(expenses)); }
  async function persistLogs(){ await storeSet(LOG_KEY, JSON.stringify(logs)); }
  async function persistUpcoming(){ await storeSet(UPCOMING_KEY, JSON.stringify(upcoming)); }

  async function addUpcoming(){
    const input = document.getElementById('upcomingInput');
    const text = input.value.trim();
    if(!text) return;
    upcoming.unshift({
      id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
      text,
      done: false,
      ts: new Date().toISOString()
    });
    input.value = '';
    await persistUpcoming();
    renderUpcoming();
    showToast('記低咗喇 ✓');
  }

  async function toggleUpcoming(id){
    const item = upcoming.find(u => u.id === id);
    if(item){
      item.done = !item.done;
      item.doneAt = item.done ? new Date().toISOString() : null;
    }
    await persistUpcoming();
    renderUpcoming();
  }

  async function deleteUpcoming(id){
    upcoming = upcoming.filter(u => u.id !== id);
    await persistUpcoming();
    renderUpcoming();
  }

  let upcomingPastOpen = false;

  function toggleUpcomingPast(){
    upcomingPastOpen = !upcomingPastOpen;
    renderUpcoming();
  }

  function renderUpcoming(){
    const list = document.getElementById('upcomingList');
    const empty = document.getElementById('upcomingEmpty');
    const pastToggle = document.getElementById('upcomingPastToggle');
    const pastList = document.getElementById('upcomingPastList');

    list.innerHTML = '';
    pastList.innerHTML = '';

    if(upcoming.length === 0){
      empty.style.display = 'block';
      pastToggle.style.display = 'none';
      pastList.style.display = 'none';
      return;
    }
    empty.style.display = 'none';

    const fmt = new Intl.DateTimeFormat('zh-Hant', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' });

    const buildItem = (u) => {
      const li = document.createElement('li');
      li.className = 'log-item upcoming-item';
      const doneLabel = (u.done && u.doneAt) ? `<div class="log-date">完成於 ${fmt.format(new Date(u.doneAt))}</div>` : '';
      li.innerHTML = `
        <div class="upcoming-check ${u.done ? 'checked' : ''}" onclick="toggleUpcoming('${u.id}')"></div>
        <div class="upcoming-body">
          <div class="upcoming-text ${u.done ? 'done' : ''}">${escapeHtml(u.text)}</div>
          ${doneLabel}
        </div>
        <span class="log-del" onclick="deleteUpcoming('${u.id}')">刪除</span>
      `;
      return li;
    };

    const notDone = upcoming.filter(u => !u.done);
    const done = upcoming.filter(u => u.done)
      .sort((a,b) => new Date(b.doneAt || b.ts) - new Date(a.doneAt || a.ts));

    notDone.forEach(u => list.appendChild(buildItem(u)));

    let visibleDone, hiddenDone;
    visibleDone = [];
    hiddenDone = done;
    visibleDone.forEach(u => list.appendChild(buildItem(u)));

    if(notDone.length === 0 && visibleDone.length === 0){
      empty.style.display = 'block';
    }

    if(hiddenDone.length > 0){
      pastToggle.style.display = 'block';
      pastToggle.textContent = upcomingPastOpen ? `▲ 收埋已完成 ${hiddenDone.length} 項` : `▼ 睇返已完成 ${hiddenDone.length} 項`;
      pastList.style.display = upcomingPastOpen ? 'flex' : 'none';
      if(upcomingPastOpen){
        hiddenDone.forEach(u => pastList.appendChild(buildItem(u)));
      }
    } else {
      pastToggle.style.display = 'none';
      pastList.style.display = 'none';
    }
  }

  const NOTE_PRESETS = {
    '食': [
      { note: '正餐' },
      { note: '珍奶' },
      { note: '咖啡' },
      { note: '零食' }
    ],
    '行': [
      { note: '地鐵', amt: 10 },
      { note: '巴士', amt: 6 },
      { note: '的士' }
    ],
    '其他': [
      { note: '娛樂' },
      { note: '購物' },
      { note: '醫療' },
      { note: '人情' }
    ]
  };

  function renderChips(cat){
    const wrap = document.getElementById('chipRow');
    wrap.innerHTML = '';
    (NOTE_PRESETS[cat] || []).forEach(p => {
      const chip = document.createElement('div');
      chip.className = 'chip';
      chip.textContent = p.note;
      chip.onclick = () => {
        document.getElementById('noteInput').value = p.note;
        if(p.amt){
          document.getElementById('amountInput').value = p.amt;
        }
        [...wrap.children].forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
      };
      wrap.appendChild(chip);
    });
  }

  const FIXED_PRESETS = {
    '食': [
      { note: 'Starbucks', amt: 100 }
    ],
    '行': [
      { note: '落山巴士', amt: 5.1 },
      { note: '600巴士', amt: 12.6 }
    ],
    '其他': []
  };

  function renderFixedRow(){
    document.querySelectorAll('.fixed-pins').forEach(slot => {
      const cat = slot.getAttribute('data-fixed-for');
      slot.innerHTML = '';
      (FIXED_PRESETS[cat] || []).forEach(p => {
        const pin = document.createElement('div');
        pin.className = 'fixed-pin';
        pin.innerHTML = `${escapeHtml(p.note)}<span class="amt">$${p.amt}</span>`;
        pin.onclick = (e) => {
          e.stopPropagation();
          logFixed(cat, p);
        };
        slot.appendChild(pin);
      });
    });
  }

  async function logFixed(cat, p){
    expenses.push({
      id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
      category: cat,
      amount: p.amt,
      note: p.note,
      ts: new Date().toISOString()
    });
    await persistExpenses();
    renderDashboard();
    showToast(`${p.note} $${p.amt} 記低咗喇 ✓`);
  }

  function todayISO(){
    const d = new Date();
    const off = d.getTimezoneOffset();
    const local = new Date(d.getTime() - off*60000);
    return local.toISOString().slice(0,10);
  }

  function openAmountPanel(cat){
    currentCat = cat;
    const panel = document.getElementById('amountPanel');
    panel.classList.add('show');
    document.getElementById('amountInput').value = '';
    document.getElementById('noteInput').value = '';
    document.getElementById('dateInput').value = todayISO();
    renderChips(cat);
    document.getElementById('amountInput').focus();
  }

  function closeAmountPanel(){
    document.getElementById('amountPanel').classList.remove('show');
    currentCat = null;
  }

  async function saveExpense(){
    const amt = parseFloat(document.getElementById('amountInput').value);
    if(!amt || amt <= 0){
      showToast('打個金額先啦');
      return;
    }
    const note = document.getElementById('noteInput').value.trim();
    const chosenDate = document.getElementById('dateInput').value || todayISO();
    const ts = chosenDate === todayISO()
      ? new Date().toISOString()
      : new Date(chosenDate + 'T12:00:00').toISOString();
    expenses.push({
      id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
      category: currentCat,
      amount: amt,
      note: note,
      ts: ts
    });
    await persistExpenses();
    closeAmountPanel();
    renderDashboard();
    showToast('記低咗喇 ✓');
  }

  function currentMonthKey(d = new Date()){
    return d.getFullYear() + '-' + (d.getMonth()+1);
  }

  function targetDateForOffset(offset){
    const d = new Date();
    d.setDate(1);
    d.setMonth(d.getMonth() + offset);
    return d;
  }

  function changeMonth(delta){
    if(monthOffset + delta > 0) return;
    monthOffset += delta;
    renderDashboard();
  }

  function renderDashboard(){
    const target = targetDateForOffset(monthOffset);
    const key = currentMonthKey(target);
    const monthExpenses = expenses.filter(e => currentMonthKey(new Date(e.ts)) === key);

    const totals = { '食':0, '行':0, '其他':0 };
    monthExpenses.forEach(e => { totals[e.category] = (totals[e.category]||0) + e.amount; });

    const total = totals['食'] + totals['行'] + totals['其他'];
    document.getElementById('monthTotal').textContent = total.toLocaleString();

    const max = Math.max(totals['食'], totals['行'], totals['其他'], 1);
    const maxHeight = 90;

    setBar('barFood', 'amtFood', totals['食'], max, maxHeight);
    setBar('barTransport', 'amtTransport', totals['行'], max, maxHeight);
    setBar('barOther', 'amtOther', totals['其他'], max, maxHeight);

    document.getElementById('monthNavLabel').textContent = monthOffset === 0 ? '呢個月' : '過去';
    const label = new Intl.DateTimeFormat('zh-Hant', { year:'numeric', month:'long' }).format(target);
    document.getElementById('monthNavCurrent').textContent = label;
    document.getElementById('nextArrow').classList.toggle('disabled', monthOffset === 0);
  }

  function setBar(barId, amtId, value, max, maxHeight){
    const h = value > 0 ? Math.max(6, (value/max) * maxHeight) : 6;
    document.getElementById(barId).style.height = h + 'px';
    document.getElementById(amtId).textContent = value.toLocaleString();
  }

  async function addLog(){
    const input = document.getElementById('logInput');
    const text = input.value.trim();
    if(!text) return;
    logs.unshift({
      id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
      text,
      ts: new Date().toISOString()
    });
    input.value = '';
    await persistLogs();
    renderLog();
    showToast('記低咗喇 ✓');
  }

  async function deleteLog(id){
    logs = logs.filter(l => l.id !== id);
    await persistLogs();
    renderLog();
  }

  let pastLogOpen = false;

  function togglePastLog(){
    pastLogOpen = !pastLogOpen;
    renderLog();
  }

  function renderLog(){
    const list = document.getElementById('logList');
    const empty = document.getElementById('logEmpty');
    const pastToggle = document.getElementById('pastToggle');
    const pastList = document.getElementById('pastLogList');

    list.innerHTML = '';
    pastList.innerHTML = '';

    if(logs.length === 0){
      empty.style.display = 'block';
      pastToggle.style.display = 'none';
      pastList.style.display = 'none';
      return;
    }
    empty.style.display = 'none';

    const recent = logs.slice(0, 5);
    const past = logs.slice(5);

    const fmt = new Intl.DateTimeFormat('zh-Hant', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' });

    const buildItem = (l) => {
      const li = document.createElement('li');
      li.className = 'log-item';
      const dateStr = fmt.format(new Date(l.ts));
      li.innerHTML = `<div class="log-date">${dateStr}</div><div>${escapeHtml(l.text)}</div><span class="log-del" onclick="deleteLog('${l.id}')">刪除</span>`;
      return li;
    };

    if(recent.length === 0){
      const li = document.createElement('li');
      li.className = 'empty-note';
      li.style.padding = '4px';
      li.textContent = '仲未有記錄';
      list.appendChild(li);
    } else {
      recent.forEach(l => list.appendChild(buildItem(l)));
    }

    if(past.length > 0){
      pastToggle.style.display = 'block';
      pastToggle.textContent = pastLogOpen ? `▲ 收埋過去 ${past.length} 條記錄` : `▼ 睇返過去 ${past.length} 條記錄`;
      pastList.style.display = pastLogOpen ? 'flex' : 'none';
      if(pastLogOpen){
        past.forEach(l => pastList.appendChild(buildItem(l)));
      }
    } else {
      pastToggle.style.display = 'none';
      pastList.style.display = 'none';
    }
  }

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  let toastTimer;
  function showToast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
  }

  document.getElementById('logInput').addEventListener('keydown', (e) => {
    if(e.key === 'Enter') addLog();
  });
  document.getElementById('amountInput').addEventListener('keydown', (e) => {
    if(e.key === 'Enter') saveExpense();
  });
  document.getElementById('upcomingInput').addEventListener('keydown', (e) => {
    if(e.key === 'Enter') addUpcoming();
  });

  loadData();
</script>

</body>
</html>

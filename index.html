<title>整理 · 記帳與生活</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --ink: #131313;
    --paper: #FFFFFF;
    --paper-2: #F4F4F2;
    --red: #E1362F;
    --yellow: #FFD23F;
    --line: #131313;
    --soft: #6b6b6b;
  }

  *{ box-sizing: border-box; }

  html, body{
    overflow-x: hidden;
    width: 100%;
  }

  body{
    margin:0;
    background: var(--paper-2);
    background-image:
      radial-gradient(circle, rgba(19,19,19,0.14) 1.1px, transparent 1.1px);
    background-size: 10px 10px;
    color: var(--ink);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    padding-top: calc(env(safe-area-inset-top, 0px) + 28px);
    padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 60px);
    padding-left: calc(env(safe-area-inset-left, 0px) + 14px);
    padding-right: calc(env(safe-area-inset-right, 0px) + 14px);
  }

  .app{
    max-width: 480px;
    margin: 0 auto;
    overflow: hidden;
  }

  header{
    text-align:center;
    margin-bottom: 30px;
    position: relative;
  }

  header .banner{
    display:inline-block;
    position:relative;
    padding: 8px 30px;
    background: var(--ink);
    transform: skew(-8deg) rotate(-1.5deg);
    box-shadow: 5px 5px 0 var(--red);
  }

  header h1{
    font-weight: 900;
    font-size: 26px;
    margin: 0;
    letter-spacing: 6px;
    color: #fff;
    display:inline-block;
    transform: skew(8deg) rotate(1.5deg);
  }

  header .sub{
    font-size: 12px;
    color: var(--soft);
    letter-spacing: 1px;
    margin-top: 14px;
    font-weight: 500;
  }

  header .sub::before, header .sub::after{
    content: "★";
    color: var(--red);
    margin: 0 6px;
    font-size: 9px;
    vertical-align: middle;
  }

  .sync-badge{
    display:inline-block;
    margin-top: 8px;
    font-size: 11px;
    font-weight: 700;
    color: #3B7D3B;
    background: #DBEDDB;
    border: 1.5px solid #3B7D3B;
    border-radius: 20px;
    padding: 3px 10px;
  }

  .card{
    background: var(--paper);
    border: 3px solid var(--ink);
    border-radius: 4px;
    padding: 20px;
    margin-bottom: 26px;
    box-shadow: 6px 6px 0 var(--ink);
    position: relative;
  }

  .card:nth-of-type(odd){ transform: rotate(-0.4deg); }
  .card:nth-of-type(even){ transform: rotate(0.4deg); }

  .card::after{
    content:"";
    position:absolute;
    top: -3px; right: -3px;
    width: 0; height: 0;
    border-style: solid;
    border-width: 0 22px 22px 0;
    border-color: transparent var(--yellow) transparent transparent;
  }

  .section-title{
    font-size: 15px;
    font-weight: 900;
    margin: 0 0 16px;
    display:flex;
    align-items:center;
    gap: 9px;
    color: var(--ink);
    letter-spacing: 1px;
  }

  .section-title .dot{
    width:0; height:0;
    border-left: 6px solid transparent;
    border-right: 6px solid transparent;
    border-bottom: 10px solid var(--red);
    display:inline-block;
    transform: rotate(90deg);
  }

  .section-title-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom: 4px;
  }
  .section-title-row .section-title{ margin-bottom: 0; }

  .gear-btn{
    font-size: 11px;
    font-weight: 700;
    color: var(--soft);
    cursor:pointer;
    border: 1.5px solid var(--soft);
    border-radius: 20px;
    padding: 3px 10px;
  }
  .gear-btn:hover{ color: var(--ink); border-color: var(--ink); }

  .manage-panel{
    display:none;
    margin-top: 18px;
    background: var(--paper-2);
    border: 2.5px dashed var(--ink);
    border-radius: 6px;
    padding: 16px;
  }
  .manage-panel.show{ display:block; }

  .manage-cat-group{
    margin-bottom: 12px;
  }
  .manage-cat-label{
    font-size: 12px;
    font-weight: 900;
    color: var(--ink);
    margin-bottom: 6px;
  }
  .manage-pin-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background: var(--paper);
    border: 1.5px solid var(--line);
    border-radius: 4px;
    padding: 5px 10px;
    margin-bottom: 5px;
    font-size: 13px;
  }
  .manage-pin-row .amt{ color: var(--red); font-weight:700; margin-left: 6px; }
  .manage-pin-row .rm{
    cursor:pointer;
    color: var(--soft);
    font-size: 12px;
    font-weight: 700;
  }
  .manage-pin-row .rm:hover{ color: var(--red); }

  .manage-empty{
    font-size: 12px;
    color: var(--soft);
    margin-bottom: 10px;
  }

  .manage-add-row{
    display:flex;
    flex-wrap: wrap;
    gap: 8px;
    margin: 14px 0 12px;
    border-top: 2px dashed var(--ink);
    padding-top: 14px;
  }
  .manage-select{
    flex: 0 0 90px;
    font-size: 13px;
    font-weight: 700;
    border: 2px solid var(--ink);
    border-radius: 4px;
    background: var(--paper);
    padding: 6px;
    color: var(--ink);
  }
  .manage-add-row input{
    flex: 1 1 100px;
    min-width: 90px;
    font-size: 13px;
    font-family:'Noto Sans TC', sans-serif;
    border: none;
    border-bottom: 2px solid var(--ink);
    background: transparent;
    padding: 6px 4px;
    color: var(--ink);
    outline:none;
  }

  .fixed-pins{
    margin-top: 8px;
    display:flex;
    flex-direction:column;
    gap: 5px;
  }
  .fixed-pins:empty{ display:none; }

  .fixed-pin{
    background: var(--yellow);
    border: 2px solid var(--ink);
    border-radius: 4px;
    padding: 3px 7px;
    font-size: 11px;
    font-weight: 900;
    color: var(--ink);
    cursor:pointer;
    box-shadow: 2px 2px 0 var(--ink);
    transition: transform .12s ease, box-shadow .12s ease;
    white-space: nowrap;
  }
  .fixed-pin .amt{ color: var(--red); margin-left: 3px; }
  .fixed-pin:hover{ transform: translate(-1px,-1px); box-shadow: 3px 3px 0 var(--ink); }
  .fixed-pin:active{ transform: translate(1px,1px); box-shadow: 1px 1px 0 var(--ink); }

  /* Quick record buttons */
  .quick-grid{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .cat-btn{
    flex:1;
    background: var(--paper);
    border: 2.5px solid var(--ink);
    border-radius: 6px;
    padding: 16px 6px;
    text-align:center;
    cursor:pointer;
    transition: transform .12s ease, background .12s ease, color .12s ease;
    color: var(--ink);
    font-size: 14px;
    font-weight: 700;
    box-shadow: 3px 3px 0 var(--ink);
  }
  .cat-btn:hover{
    transform: translate(-2px,-2px);
    box-shadow: 5px 5px 0 var(--ink);
    background: var(--ink);
    color: #fff;
  }
  .cat-btn:hover svg{ stroke: #fff !important; }
  .cat-btn:active{
    transform: translate(1px,1px);
    box-shadow: 2px 2px 0 var(--ink);
  }

  .cat-btn svg{ width: 32px; height: 32px; display:block; margin: 0 auto 8px; transition: stroke .12s ease; }

  /* Amount panel */
  .amount-panel{
    display:none;
    margin-top: 18px;
    background: var(--paper-2);
    border: 2.5px dashed var(--ink);
    border-radius: 6px;
    padding: 16px;
  }
  .amount-panel.show{ display:block; }

  .amount-panel .row{
    display:flex;
    align-items:center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .amount-panel .currency{
    font-size: 24px;
    font-weight: 900;
    color: var(--red);
  }

  .amount-panel input[type="number"]{
    flex:1;
    font-size: 24px;
    font-weight: 900;
    font-family:'Noto Sans TC', sans-serif;
    border: none;
    border-bottom: 3px solid var(--ink);
    background: transparent;
    padding: 4px 2px;
    color: var(--ink);
    outline:none;
  }

  .amount-panel input[type="text"]{
    width:100%;
    font-size: 13px;
    font-family:'Noto Sans TC', sans-serif;
    font-weight: 500;
    border: none;
    border-bottom: 2px dotted var(--ink);
    background: transparent;
    padding: 6px 2px;
    color: var(--ink);
    outline:none;
    margin-bottom: 14px;
  }

  .date-row{
    display:flex;
    align-items:center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .date-label{
    font-size: 12px;
    font-weight: 900;
    color: var(--soft);
  }
  .amount-panel input[type="date"]{
    font-size: 13px;
    font-weight: 700;
    font-family:'Noto Sans TC', sans-serif;
    border: 2px solid var(--ink);
    border-radius: 4px;
    background: var(--paper);
    padding: 5px 8px;
    color: var(--ink);
    outline:none;
  }

  .chip-row{
    display:flex;
    flex-wrap:wrap;
    gap: 8px;
    margin-bottom: 14px;
  }

  .chip{
    background: var(--paper);
    border: 2px solid var(--ink);
    border-radius: 20px;
    padding: 5px 13px;
    font-size: 12.5px;
    font-weight: 700;
    color: var(--ink);
    cursor:pointer;
    transition: background .12s ease, color .12s ease;
  }
  .chip:hover{
    background: var(--yellow);
  }
  .chip.active{
    background: var(--ink);
    color: #fff;
    border-color: var(--ink);
  }

  .btn-row{ display:flex; gap: 10px; }

  .panel-edit-label{
    font-size: 12px;
    font-weight: 900;
    color: var(--red);
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .delete-row{
    text-align:center;
    margin-top: 12px;
  }
  .delete-row span{
    font-size: 12px;
    font-weight: 700;
    color: var(--soft);
    cursor:pointer;
  }
  .delete-row span:hover{ color: var(--red); }

  .btn{
    border: 2.5px solid var(--ink);
    border-radius: 6px;
    padding: 10px 16px;
    font-family:'Noto Sans TC', sans-serif;
    font-size: 14px;
    font-weight: 900;
    cursor:pointer;
    transition: transform .12s ease, box-shadow .12s ease;
  }

  .btn-save{
    background: var(--red);
    color: #fff;
    border-color: var(--ink);
    flex:1;
    box-shadow: 3px 3px 0 var(--ink);
  }
  .btn-save:hover{ transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--ink); }
  .btn-save:active{ transform: translate(1px,1px); box-shadow: 1px 1px 0 var(--ink); }

  .btn-cancel{
    background: var(--paper);
    color: var(--ink);
  }

  .toast{
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(20px) rotate(-1deg);
    background: var(--ink);
    color: #fff;
    padding: 10px 22px;
    border-radius: 4px;
    font-size: 13px;
    font-weight: 700;
    opacity:0;
    transition: all .3s ease;
    pointer-events:none;
    white-space:nowrap;
    border: 2px solid var(--red);
  }
  .toast.show{ opacity:1; transform: translateX(-50%) translateY(0) rotate(-1deg); }

  .month-nav{
    display:flex;
    align-items:center;
    gap: 12px;
    margin-bottom: 6px;
  }
  .nav-arrow{
    cursor:pointer;
    font-size: 13px;
    font-weight: 900;
    width: 26px; height: 26px;
    display:flex;
    align-items:center;
    justify-content:center;
    border: 2px solid var(--ink);
    border-radius: 4px;
    background: var(--paper);
    box-shadow: 2px 2px 0 var(--ink);
    user-select:none;
  }
  .nav-arrow:active{ transform: translate(1px,1px); box-shadow: 1px 1px 0 var(--ink); }
  .nav-arrow.disabled{
    opacity: .3;
    pointer-events: none;
  }
  .nav-current{
    font-size: 13px;
    font-weight: 700;
    color: var(--soft);
  }

  /* Dashboard */
  .month-total-wrap{
    position: relative;
    display:inline-block;
    margin: 4px 0 20px;
  }

  .month-total-wrap .burst{
    position:absolute;
    top: 50%; left: 14px;
    transform: translateY(-50%);
    width: 90px; height: 90px;
    background:
      repeating-conic-gradient(var(--yellow) 0deg 11.25deg, transparent 11.25deg 22.5deg);
    border-radius: 50%;
    z-index: 0;
    opacity: .9;
  }

  .month-total{
    font-size: 38px;
    font-weight: 900;
    position: relative;
    z-index: 1;
    padding-left: 14px;
  }
  .month-total .unit{ font-size: 15px; font-weight: 700; color: var(--ink); margin-left: 4px;}

  .bars{
    display:flex;
    align-items:flex-end;
    gap: 10px;
    height: 110px;
    margin-bottom: 10px;
    padding: 0 2px;
  }

  .bar-col{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-end;
    height:100%;
    min-width: 0;
    cursor: pointer;
    border-radius: 6px;
    padding: 4px 2px 2px;
    transition: background .12s ease;
  }
  .bar-col:hover{ background: var(--paper-2); }
  .bar-col.selected{ background: var(--paper-2); outline: 2px dashed var(--ink); outline-offset: 2px; }

  .breakdown-panel{
    margin-top: 16px;
    background: var(--paper-2);
    border: 2.5px solid var(--ink);
    border-radius: 6px;
    padding: 14px 16px;
  }
  .breakdown-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    font-size: 13px;
    font-weight: 900;
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 2px dashed var(--ink);
  }
  .breakdown-close{
    cursor:pointer;
    font-size: 13px;
    color: var(--soft);
    font-weight: 900;
  }
  .breakdown-close:hover{ color: var(--red); }
  .breakdown-row{
    display:flex;
    align-items:center;
    gap: 10px;
    margin-bottom: 8px;
    font-size: 13px;
  }
  .breakdown-row .bd-note{
    flex-shrink:0;
    width: 84px;
    font-weight: 700;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .breakdown-row .bd-bar-track{
    flex:1;
    height: 14px;
    background: var(--paper);
    border: 1.5px solid var(--ink);
    border-radius: 3px;
    overflow:hidden;
  }
  .breakdown-row .bd-bar-fill{
    height:100%;
    background: var(--red);
  }
  .breakdown-row .bd-amt{
    flex-shrink:0;
    width: 62px;
    text-align:right;
    font-weight: 900;
    color: var(--red);
  }
  .breakdown-empty{
    font-size: 12px;
    color: var(--soft);
    text-align:center;
    padding: 10px;
  }

  .bar{
    width: 100%;
    max-width: 40px;
    border: 2.5px solid var(--ink);
    border-radius: 3px 3px 0 0;
    transition: height .4s ease;
    min-height: 6px;
  }
  .bar.food{ background: var(--ink); }
  .bar.transport{
    background-image: repeating-linear-gradient(45deg, var(--ink) 0 4px, var(--paper) 4px 8px);
  }
  .bar.other{ background: var(--red); }
  .bar.regular{
    background-color: var(--paper);
    background-image: radial-gradient(circle, var(--ink) 2.2px, transparent 2.2px);
    background-size: 9px 9px;
    background-position: center;
  }
  .bar.misc{
    background-color: var(--paper);
    background-image: repeating-linear-gradient(90deg, var(--ink) 0 3px, var(--paper) 3px 7px);
  }
  .bar.ccard{ background: var(--yellow); }

  .bar-label{
    font-size: 12px;
    font-weight: 700;
    color: var(--ink);
    margin-top: 8px;
    text-align:center;
  }
  .bar-amount{
    font-size: 11px;
    color: var(--soft);
    margin-top: 2px;
    font-weight: 500;
  }

  .empty-note{
    font-size: 13px;
    color: var(--soft);
    text-align:center;
    padding: 20px 10px;
    line-height:1.6;
    font-weight: 500;
  }

  /* Weekly log */
  .log-input-row{
    display:flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 18px;
  }
  .log-input-row input{
    flex:1;
    min-width: 120px;
    font-size: 14px;
    font-family:'Noto Sans TC', sans-serif;
    font-weight: 500;
    border: none;
    border-bottom: 3px solid var(--ink);
    background: transparent;
    padding: 8px 4px;
    color: var(--ink);
    outline:none;
  }
  .log-input-row button{
    flex-shrink: 0;
    background: var(--ink);
    color: #fff;
    border: 2.5px solid var(--ink);
    border-radius: 6px;
    padding: 0 18px;
    font-size: 14px;
    font-weight: 900;
    cursor:pointer;
    box-shadow: 3px 3px 0 var(--red);
  }
  .log-input-row button:active{ transform: translate(1px,1px); box-shadow: 1px 1px 0 var(--red); }

  .log-input-row input[type="date"].log-date-input{
    flex: 1 1 118px;
    min-width: 100px;
    max-width: 100%;
    font-size: 12px;
    font-weight: 700;
    border: 2px solid var(--ink);
    border-radius: 4px;
    background: var(--paper);
    padding: 6px 6px;
    color: var(--ink);
    outline:none;
  }
  .log-input-row input[type="date"].log-date-full{
    flex: 1 1 100%;
    width: 100%;
  }

  .log-list{
    list-style:none;
    margin:0; padding:0;
    display:flex;
    flex-direction:column;
    gap: 10px;
  }

  .log-item{
    background: var(--paper-2);
    border: 2px solid var(--ink);
    border-radius: 4px;
    padding: 12px 14px;
    font-size: 13px;
    font-weight: 500;
    position:relative;
    border-left: 6px solid var(--red);
  }
  .log-item .log-date{
    font-size: 11px;
    color: var(--soft);
    margin-bottom: 4px;
    font-weight: 700;
  }
  .log-item .log-del{
    cursor:pointer;
    color: var(--soft);
    font-size: 12px;
    font-weight: 700;
    opacity:.55;
    flex-shrink: 0;
  }
  .log-item .log-del:hover{ opacity:1; color: var(--red); }

  .log-actions{
    position:absolute;
    top:8px; right:10px;
    display:flex;
    gap: 10px;
  }

  .log-item.log-edit{
    display:flex;
    flex-wrap: wrap;
    align-items:center;
    gap: 8px;
  }
  .log-edit-input{
    flex: 1 1 140px;
    min-width: 100px;
    font-size: 13px;
    font-family:'Noto Sans TC', sans-serif;
    font-weight: 500;
    border: none;
    border-bottom: 2px solid var(--ink);
    background: transparent;
    padding: 4px 2px;
    color: var(--ink);
    outline:none;
  }
  .log-edit-actions{
    display:flex;
    gap: 6px;
    flex-shrink: 0;
  }
  .log-edit-actions .btn{
    padding: 6px 12px;
    font-size: 12px;
    box-shadow: 2px 2px 0 var(--ink);
  }

  .expense-item{
    display:flex;
    align-items:center;
    gap: 10px;
    padding-right: 66px;
  }
  .expense-item .expense-main{ flex:1; min-width:0; }
  .expense-item .expense-cat{
    display:inline-block;
    font-size: 10px;
    font-weight: 900;
    background: var(--ink);
    color: #fff;
    border-radius: 3px;
    padding: 1px 6px;
    margin-right: 6px;
  }
  .expense-item .expense-amt{
    font-weight: 900;
    color: var(--red);
  }
  .expense-actions{
    position:absolute;
    top:8px; right:10px;
    display:flex;
    gap: 10px;
  }
  .expense-actions span{
    cursor:pointer;
    color: var(--soft);
    font-size: 12px;
    font-weight: 700;
    opacity:.6;
  }
  .expense-actions span:hover{ opacity:1; color: var(--red); }

  .view-toggle{
    display:flex;
    gap: 8px;
    margin-bottom: 14px;
  }
  .view-btn{
    font-size: 12px;
    font-weight: 900;
    padding: 5px 14px;
    border: 2px solid var(--ink);
    border-radius: 20px;
    cursor:pointer;
    color: var(--ink);
    background: var(--paper);
  }
  .view-btn.active{
    background: var(--ink);
    color: #fff;
  }

  .cal-grid{
    display:grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-top: 8px;
  }
  .cal-dow{
    text-align:center;
    font-size: 10px;
    font-weight: 900;
    color: var(--soft);
    padding-bottom: 2px;
  }
  .cal-day{
    aspect-ratio: 1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    border: 1.5px solid var(--line, var(--soft));
    border-radius: 4px;
    font-size: 11px;
    font-weight: 700;
    color: var(--ink);
    cursor:pointer;
    background: var(--paper);
    position:relative;
  }
  .cal-day.empty{
    border: none;
    cursor: default;
    background: transparent;
  }
  .cal-day.has-entry{
    border-color: var(--ink);
    background: var(--paper-2);
  }
  .cal-day.today{
    outline: 2px solid var(--red);
    outline-offset: -2px;
  }
  .cal-day.selected{
    background: var(--ink);
    color: #fff;
  }
  .cal-day .dot{
    width: 5px; height:5px;
    border-radius: 50%;
    background: var(--red);
    margin-top: 2px;
  }
  .cal-day.selected .dot{ background: var(--yellow); }

  .past-toggle{
    margin-top: 12px;
    text-align:center;
    font-size: 12px;
    font-weight: 700;
    color: var(--soft);
    cursor:pointer;
    border-top: 2px dashed var(--ink);
    padding-top: 10px;
  }
  .past-toggle:hover{ color: var(--red); }
  .past-list{ margin-top: 10px; }

  .upcoming-item{
    display:flex;
    align-items:flex-start;
    gap: 10px;
  }

  .upcoming-check{
    flex-shrink:0;
    width: 20px; height: 20px;
    border: 2.5px solid var(--ink);
    border-radius: 4px;
    margin-top: 1px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    background: var(--paper);
  }
  .upcoming-check.checked{
    background: var(--red);
  }
  .upcoming-check.checked::after{
    content:"✓";
    color:#fff;
    font-size: 13px;
    font-weight: 900;
  }

  .upcoming-text{ flex:1; }
  .upcoming-body{ flex:1; }
  .upcoming-text.done{
    text-decoration: line-through;
    color: var(--soft);
  }

  .loading-hint{
    text-align:center;
    color: var(--soft);
    font-size: 12px;
    padding: 10px;
  }
</style>
</head>
<body>

<div class="app">
  <header>
    <div class="banner"><h1>整理</h1></div>
    <div class="sub" id="todayLabel"></div>
    <div class="sync-badge" id="syncBadge" style="display:none;">☁️ 已連接同步</div>
  </header>

  <!-- Quick record -->
  <div class="card">
    <div class="section-title-row">
      <div class="section-title"><span class="dot"></span>記一筆</div>
      <span class="gear-btn" onclick="openManageFixed()">⚙ 管理常用</span>
    </div>

    <div class="quick-grid">
      <div class="cat-btn food" data-cat="食" onclick="openAmountPanel('食')">
        <svg viewBox="0 0 40 40" fill="none" stroke="#131313" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 6 C10 12, 10 16, 12 20 M12 6 L12 34 M9 6 L9 14 M15 6 L15 14"/>
          <path d="M27 6 C24 10, 23 16, 26 20 C28 22, 28 30, 27 34 C27 26, 25 22, 25 20"/>
        </svg>
        <div>食</div>
        <div class="fixed-pins" data-fixed-for="食"></div>
      </div>
      <div class="cat-btn transport" data-cat="行" onclick="openAmountPanel('行')">
        <svg viewBox="0 0 40 40" fill="none" stroke="#131313" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <rect x="8" y="12" width="24" height="16" rx="4"/>
          <path d="M8 20 h24"/>
          <circle cx="14" cy="30" r="2.5"/>
          <circle cx="26" cy="30" r="2.5"/>
          <path d="M11 12 L14 6 h12 l3 6"/>
        </svg>
        <div>行</div>
        <div class="fixed-pins" data-fixed-for="行"></div>
      </div>
      <div class="cat-btn other" data-cat="買野" onclick="openAmountPanel('買野')">
        <svg viewBox="0 0 40 40" fill="none" stroke="#131313" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10 15 h20 l-1.5 18 a2 2 0 0 1 -2 1.8 h-13 a2 2 0 0 1 -2 -1.8 Z"/>
          <path d="M14 15 v-3 a6 6 0 0 1 12 0 v3"/>
        </svg>
        <div>買野</div>
        <div class="fixed-pins" data-fixed-for="買野"></div>
      </div>
      <div class="cat-btn regular" data-cat="定期" onclick="openAmountPanel('定期')">
        <svg viewBox="0 0 40 40" fill="none" stroke="#131313" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="20" cy="20" r="13"/>
          <path d="M20 12 v8 l6 4"/>
          <path d="M20 4 v4 M20 32 v4 M4 20 h4 M32 20 h4"/>
        </svg>
        <div>定期</div>
        <div class="fixed-pins" data-fixed-for="定期"></div>
      </div>
      <div class="cat-btn misc" data-cat="其他" onclick="openAmountPanel('其他')">
        <svg viewBox="0 0 40 40" fill="none" stroke="#131313" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 32 C20 32 6 23 6 13.5 C6 8.5 10 6 14 6 C17 6 19 8 20 10 C21 8 23 6 26 6 C30 6 34 8.5 34 13.5 C34 23 20 32 20 32 Z"/>
        </svg>
        <div>其他</div>
        <div class="fixed-pins" data-fixed-for="其他"></div>
      </div>
      <div class="cat-btn ccard" data-cat="信用卡" onclick="openAmountPanel('信用卡')">
        <svg viewBox="0 0 40 40" fill="none" stroke="#131313" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <rect x="5" y="10" width="30" height="20" rx="3"/>
          <path d="M5 16 h30"/>
          <path d="M10 24 h8"/>
        </svg>
        <div>信用卡</div>
        <div class="fixed-pins" data-fixed-for="信用卡"></div>
      </div>

<!-- Firebase (for cross-device sync) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
  // ===== Firebase 設定 =====
  // 去 https://console.firebase.google.com 開個project、開啟Firestore Database之後,
  // 喺 Project settings → Your apps → Web app 度攞返呢組config,填入下面就得。
  // 未填之前(即係仲係下面呢啲假值),app會照舊淨係用返本機儲存,唔會sync。
  const FIREBASE_CONFIG = {
    apiKey: "AIzaSyCAlWd04pMlfbUvCOevtRiiiAgxD0yznCQ",
    authDomain: "life-tracking-7ad57.firebaseapp.com",
    projectId: "life-tracking-7ad57",
    storageBucket: "life-tracking-7ad57.firebasestorage.app",
    messagingSenderId: "467249544296",
    appId: "1:467249544296:web:ff17541dac849f32fb8fdd"
  };

  let firebaseReady = false;
  let db = null;

  function tryInitFirebase(){
    if(FIREBASE_CONFIG.apiKey === "YOUR_API_KEY") return;
    try{
      firebase.initializeApp(FIREBASE_CONFIG);
      db = firebase.firestore();
      firebaseReady = true;
      console.log('Firebase sync 已連接');
      const badge = document.getElementById('syncBadge');
      if(badge) badge.style.display = 'inline-block';
    }catch(e){
      console.error('Firebase init failed', e);
      firebaseReady = false;
    }
  }
  tryInitFirebase();

  const EXPENSES_KEY = 'expenses-v1';
  const LOG_KEY = 'life-log-v1';
  const UPCOMING_KEY = 'upcoming-v1';

  let expenses = [];
  let logs = [];
  let upcoming = [];
  let currentCat = null;
  let editingExpenseId = null;
  let monthOffset = 0;
  let currentMonthExpenses = [];
  let selectedBreakdownCat = null;

  const todayLabelEl = document.getElementById('todayLabel');
  const dateFmt = new Intl.DateTimeFormat('zh-Hant', { year:'numeric', month:'long', day:'numeric', weekday:'long' });
  todayLabelEl.textContent = dateFmt.format(new Date());

  const hasClaudeStorage = () => (typeof window.storage !== 'undefined' && window.storage && typeof window.storage.get === 'function');

  async function storeGet(key){
    if(firebaseReady){
      try{
        const doc = await db.collection('lifeapp_data').doc(key).get();
        if(doc.exists){
          const value = doc.data().value;
          try{ localStorage.setItem(key, value); }catch(e){}
          return value;
        }
      }catch(e){ console.error('firestore get failed, falling back', e); }
    }
    if(hasClaudeStorage()){
      try{
        const r = await window.storage.get(key, false);
        return r && r.value ? r.value : null;
      }catch(e){ return null; }
    }
    return localStorage.getItem(key);
  }

  async function storeSet(key, value){
    try{ localStorage.setItem(key, value); }catch(e){}
    if(firebaseReady){
      try{
        await db.collection('lifeapp_data').doc(key).set({
          value: value,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        return;
      }catch(e){ console.error('firestore set failed, falling back', e); }
    }
    if(hasClaudeStorage()){
      try{ await window.storage.set(key, value, false); }
      catch(e){ console.error('claude storage set failed', e); }
    }
  }

  function watchRemoteSync(){
    if(!firebaseReady) return;
    const keys = [EXPENSES_KEY, LOG_KEY, UPCOMING_KEY, FIXED_PRESETS_KEY];
    keys.forEach(key => {
      db.collection('lifeapp_data').doc(key).onSnapshot(doc => {
        if(!doc.exists) return;
        const value = doc.data().value;
        applyRemoteUpdate(key, value);
      }, err => console.error('sync listener error', err));
    });
  }

  function applyRemoteUpdate(key, value){
    try{
      if(key === EXPENSES_KEY){ expenses = JSON.parse(value); renderDashboard(); }
      else if(key === LOG_KEY){ logs = JSON.parse(value); renderLog(); if(logViewMode === 'calendar') renderCalendar(); }
      else if(key === UPCOMING_KEY){ upcoming = JSON.parse(value); renderUpcoming(); }
      else if(key === FIXED_PRESETS_KEY){ fixedPresets = JSON.parse(value); renderFixedRow(); }
      try{ localStorage.setItem(key, value); }catch(e){}
    }catch(e){ console.error('apply remote update failed', e); }
  }

  async function loadData(){
    expenses = JSON.parse((await storeGet(EXPENSES_KEY)) || '[]');
    logs = JSON.parse((await storeGet(LOG_KEY)) || '[]');
    upcoming = JSON.parse((await storeGet(UPCOMING_KEY)) || '[]');
    await loadFixedPresets();

    renderDashboard();
    renderLog();
    renderFixedRow();
    renderUpcoming();
    document.getElementById('logDateInput').value = todayISO();
  }

  async function persistExpenses(){ await storeSet(EXPENSES_KEY, JSON.stringify(expenses)); }
  async function persistLogs(){ await storeSet(LOG_KEY, JSON.stringify(logs)); }
  async function persistUpcoming(){ await storeSet(UPCOMING_KEY, JSON.stringify(upcoming)); }

  async function addUpcoming(){
    const input = document.getElementById('upcomingInput');
    const text = input.value.trim();
    if(!text) return;
    upcoming.unshift({
      id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
      text,
      done: false,
      ts: new Date().toISOString()
    });
    input.value = '';
    await persistUpcoming();
    renderUpcoming();
    showToast('記低咗喇 ✓');
  }

  async function toggleUpcoming(id){
    const item = upcoming.find(u => u.id === id);
    if(item){
      item.done = !item.done;
      item.doneAt = item.done ? new Date().toISOString() : null;
    }
    await persistUpcoming();
    renderUpcoming();
  }

  async function deleteUpcoming(id){
    upcoming = upcoming.filter(u => u.id !== id);
    await persistUpcoming();
    renderUpcoming();
  }

  let upcomingPastOpen = false;

  function toggleUpcomingPast(){
    upcomingPastOpen = !upcomingPastOpen;
    renderUpcoming();
  }

  function renderUpcoming(){
    const list = document.getElementById('upcomingList');
    const empty = document.getElementById('upcomingEmpty');
    const pastToggle = document.getElementById('upcomingPastToggle');
    const pastList = document.getElementById('upcomingPastList');

    list.innerHTML = '';
    pastList.innerHTML = '';

    if(upcoming.length === 0){
      empty.style.display = 'block';
      pastToggle.style.display = 'none';
      pastList.style.display = 'none';
      return;
    }
    empty.style.display = 'none';

    const fmt = new Intl.DateTimeFormat('zh-Hant', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' });

    const buildItem = (u) => {
      const li = document.createElement('li');
      li.className = 'log-item upcoming-item';
      const doneLabel = (u.done && u.doneAt) ? `<div class="log-date">完成於 ${fmt.format(new Date(u.doneAt))}</div>` : '';
      li.innerHTML = `
        <div class="upcoming-check ${u.done ? 'checked' : ''}" onclick="toggleUpcoming('${u.id}')"></div>
        <div class="upcoming-body">
          <div class="upcoming-text ${u.done ? 'done' : ''}">${escapeHtml(u.text)}</div>
          ${doneLabel}
        </div>
        <span class="log-del" onclick="deleteUpcoming('${u.id}')">刪除</span>
      `;
      return li;
    };

    const notDone = upcoming.filter(u => !u.done);
    const done = upcoming.filter(u => u.done)
      .sort((a,b) => new Date(b.doneAt || b.ts) - new Date(a.doneAt || a.ts));

    notDone.forEach(u => list.appendChild(buildItem(u)));

    let visibleDone, hiddenDone;
    visibleDone = [];
    hiddenDone = done;
    visibleDone.forEach(u => list.appendChild(buildItem(u)));

    if(notDone.length === 0 && visibleDone.length === 0){
      empty.style.display = 'block';
    }

    if(hiddenDone.length > 0){
      pastToggle.style.display = 'block';
      pastToggle.textContent = upcomingPastOpen ? `▲ 收埋已完成 ${hiddenDone.length} 項` : `▼ 睇返已完成 ${hiddenDone.length} 項`;
      pastList.style.display = upcomingPastOpen ? 'flex' : 'none';
      if(upcomingPastOpen){
        hiddenDone.forEach(u => pastList.appendChild(buildItem(u)));
      }
    } else {
      pastToggle.style.display = 'none';
      pastList.style.display = 'none';
    }
  }

  const NOTE_PRESETS = {
    '食': [
      { note: '正餐' },
      { note: '珍奶' },
      { note: '咖啡' },
      { note: '零食' }
    ],
    '行': [
      { note: '地鐵', amt: 10 },
      { note: '巴士', amt: 6 },
      { note: '的士' }
    ],
    '買野': [
      { note: '日用品' },
      { note: '無謂野' },
      { note: '周邊' }
    ],
    '定期': [
      { note: '中醫' },
      { note: '美甲' },
      { note: '剪頭髮' },
      { note: 'Facial' },
      { note: 'Counselling' }
    ],
    '其他': [
      { note: '抖內' }
    ],
    '信用卡': [
      { note: '買野' },
      { note: '找數' }
    ]
  };

  function renderChips(cat){
    const wrap = document.getElementById('chipRow');
    wrap.innerHTML = '';
    (NOTE_PRESETS[cat] || []).forEach(p => {
      const chip = document.createElement('div');
      chip.className = 'chip';
      chip.textContent = p.note;
      chip.onclick = () => {
        document.getElementById('noteInput').value = p.note;
        if(p.amt){
          document.getElementById('amountInput').value = p.amt;
        }
        [...wrap.children].forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
      };
      wrap.appendChild(chip);
    });
  }

  const DEFAULT_FIXED_PRESETS = {
    '食': [
      { note: 'Starbucks', amt: 100 }
    ],
    '行': [
      { note: '落山巴士', amt: 5.1 },
      { note: '600巴士', amt: 12.6 }
    ],
    '買野': [],
    '定期': [],
    '其他': [],
    '信用卡': []
  };

  const FIXED_PRESETS_KEY = 'fixed-presets-v1';
  const ALL_CATEGORIES = ['食','行','買野','定期','其他','信用卡'];
  let fixedPresets = JSON.parse(JSON.stringify(DEFAULT_FIXED_PRESETS));

  async function loadFixedPresets(){
    const raw = await storeGet(FIXED_PRESETS_KEY);
    if(raw){
      try{
        const saved = JSON.parse(raw);
        ALL_CATEGORIES.forEach(cat => { if(!saved[cat]) saved[cat] = []; });
        fixedPresets = saved;
      }catch(e){ fixedPresets = JSON.parse(JSON.stringify(DEFAULT_FIXED_PRESETS)); }
    }
  }

  async function persistFixedPresets(){
    await storeSet(FIXED_PRESETS_KEY, JSON.stringify(fixedPresets));
  }

  function renderFixedRow(){
    document.querySelectorAll('.fixed-pins').forEach(slot => {
      const cat = slot.getAttribute('data-fixed-for');
      slot.innerHTML = '';
      (fixedPresets[cat] || []).forEach(p => {
        const pin = document.createElement('div');
        pin.className = 'fixed-pin';
        pin.innerHTML = `${escapeHtml(p.note)}<span class="amt">$${p.amt}</span>`;
        pin.onclick = (e) => {
          e.stopPropagation();
          logFixed(cat, p);
        };
        slot.appendChild(pin);
      });
    });
  }

  function openManageFixed(){
    document.getElementById('managePanel').classList.add('show');
    const sel = document.getElementById('manageCatSelect');
    sel.innerHTML = ALL_CATEGORIES.map(c => `<option value="${c}">${c}</option>`).join('');
    document.getElementById('manageNoteInput').value = '';
    document.getElementById('manageAmtInput').value = '';
    renderManageList();
    document.getElementById('managePanel').scrollIntoView({ behavior:'smooth', block:'center' });
  }

  function closeManageFixed(){
    document.getElementById('managePanel').classList.remove('show');
  }

  function renderManageList(){
    const wrap = document.getElementById('manageList');
    wrap.innerHTML = '';
    ALL_CATEGORIES.forEach(cat => {
      const group = document.createElement('div');
      group.className = 'manage-cat-group';
      const items = fixedPresets[cat] || [];
      let rows = `<div class="manage-cat-label">${cat}</div>`;
      if(items.length === 0){
        rows += `<div class="manage-empty">未有常用項目</div>`;
      } else {
        items.forEach((p, idx) => {
          rows += `<div class="manage-pin-row"><span>${escapeHtml(p.note)}<span class="amt">$${p.amt}</span></span><span class="rm" onclick="removeFixedPreset('${cat}', ${idx})">🗑 移除</span></div>`;
        });
      }
      group.innerHTML = rows;
      wrap.appendChild(group);
    });
  }

  async function addFixedPreset(){
    const cat = document.getElementById('manageCatSelect').value;
    const note = document.getElementById('manageNoteInput').value.trim();
    const amt = parseFloat(document.getElementById('manageAmtInput').value);
    if(!note){ showToast('打個名先啦'); return; }
    if(!amt || amt <= 0){ showToast('打個金額先啦'); return; }
    if(!fixedPresets[cat]) fixedPresets[cat] = [];
    fixedPresets[cat].push({ note, amt });
    await persistFixedPresets();
    document.getElementById('manageNoteInput').value = '';
    document.getElementById('manageAmtInput').value = '';
    renderManageList();
    renderFixedRow();
    showToast('加咗喇 ✓');
  }

  async function removeFixedPreset(cat, idx){
    fixedPresets[cat].splice(idx, 1);
    await persistFixedPresets();
    renderManageList();
    renderFixedRow();
  }

  async function logFixed(cat, p){
    expenses.push({
      id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
      category: cat,
      amount: p.amt,
      note: p.note,
      ts: new Date().toISOString()
    });
    await persistExpenses();
    renderDashboard();
    showToast(`${p.note} $${p.amt} 記低咗喇 ✓`);
  }

  function todayISO(){
    const d = new Date();
    const off = d.getTimezoneOffset();
    const local = new Date(d.getTime() - off*60000);
    return local.toISOString().slice(0,10);
  }

  function openAmountPanel(cat){
    currentCat = cat;
    editingExpenseId = null;
    const panel = document.getElementById('amountPanel');
    panel.classList.add('show');
    document.getElementById('amountInput').value = '';
    document.getElementById('noteInput').value = '';
    document.getElementById('dateInput').value = todayISO();
    document.getElementById('panelEditLabel').style.display = 'none';
    document.getElementById('deleteRow').style.display = 'none';
    document.getElementById('saveBtn').textContent = '記低';
    renderChips(cat);
    document.getElementById('amountInput').focus();
  }

  function editExpense(id){
    const exp = expenses.find(e => e.id === id);
    if(!exp) return;
    currentCat = exp.category;
    editingExpenseId = id;
    const panel = document.getElementById('amountPanel');
    panel.classList.add('show');
    document.getElementById('amountInput').value = exp.amount;
    document.getElementById('noteInput').value = exp.note || '';
    document.getElementById('dateInput').value = new Date(exp.ts).toISOString().slice(0,10);
    document.getElementById('panelEditLabel').style.display = 'block';
    document.getElementById('panelEditLabel').textContent = `編輯「${exp.category}」記錄`;
    document.getElementById('deleteRow').style.display = 'block';
    document.getElementById('saveBtn').textContent = '更新';
    renderChips(exp.category);
    document.getElementById('amountInput').focus();
    panel.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  async function deleteExpenseFromPanel(){
    if(!editingExpenseId) return;
    expenses = expenses.filter(e => e.id !== editingExpenseId);
    await persistExpenses();
    closeAmountPanel();
    renderDashboard();
    showToast('刪除咗喇');
  }

  function closeAmountPanel(){
    document.getElementById('amountPanel').classList.remove('show');
    currentCat = null;
    editingExpenseId = null;
  }

  async function saveExpense(){
    const amt = parseFloat(document.getElementById('amountInput').value);
    if(!amt || amt <= 0){
      showToast('打個金額先啦');
      return;
    }
    const note = document.getElementById('noteInput').value.trim();
    const chosenDate = document.getElementById('dateInput').value || todayISO();
    const ts = chosenDate === todayISO()
      ? new Date().toISOString()
      : new Date(chosenDate + 'T12:00:00').toISOString();

    if(editingExpenseId){
      const exp = expenses.find(e => e.id === editingExpenseId);
      if(exp){
        exp.amount = amt;
        exp.note = note;
        exp.ts = ts;
      }
      await persistExpenses();
      closeAmountPanel();
      renderDashboard();
      showToast('更新咗喇 ✓');
      return;
    }

    expenses.push({
      id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
      category: currentCat,
      amount: amt,
      note: note,
      ts: ts
    });
    await persistExpenses();
    closeAmountPanel();
    renderDashboard();
    showToast('記低咗喇 ✓');
  }

  function currentMonthKey(d = new Date()){
    return d.getFullYear() + '-' + (d.getMonth()+1);
  }

  function targetDateForOffset(offset){
    const d = new Date();
    d.setDate(1);
    d.setMonth(d.getMonth() + offset);
    return d;
  }

  function changeMonth(delta){
    if(monthOffset + delta > 0) return;
    monthOffset += delta;
    renderDashboard();
  }

  function renderDashboard(){
    const target = targetDateForOffset(monthOffset);
    const key = currentMonthKey(target);
    const monthExpenses = expenses.filter(e => currentMonthKey(new Date(e.ts)) === key);
    currentMonthExpenses = monthExpenses;

    const totals = { '食':0, '行':0, '買野':0, '定期':0, '其他':0, '信用卡':0 };
    monthExpenses.forEach(e => { totals[e.category] = (totals[e.category]||0) + e.amount; });

    const total = totals['食'] + totals['行'] + totals['買野'] + totals['定期'] + totals['其他'] + totals['信用卡'];
    document.getElementById('monthTotal').textContent = total.toLocaleString();

    const max = Math.max(totals['食'], totals['行'], totals['買野'], totals['定期'], totals['其他'], totals['信用卡'], 1);
    const maxHeight = 90;

    setBar('barFood', 'amtFood', totals['食'], max, maxHeight);
    setBar('barTransport', 'amtTransport', totals['行'], max, maxHeight);
    setBar('barOther', 'amtOther', totals['買野'], max, maxHeight);
    setBar('barRegular', 'amtRegular', totals['定期'], max, maxHeight);
    setBar('barMisc', 'amtMisc', totals['其他'], max, maxHeight);
    setBar('barCard', 'amtCard', totals['信用卡'], max, maxHeight);

    document.getElementById('monthNavLabel').textContent = monthOffset === 0 ? '呢個月' : '過去';
    const label = new Intl.DateTimeFormat('zh-Hant', { year:'numeric', month:'long' }).format(target);
    document.getElementById('monthNavCurrent').textContent = label;
    document.getElementById('nextArrow').classList.toggle('disabled', monthOffset === 0);

    renderExpenseList(monthExpenses);

    if(selectedBreakdownCat){
      showBreakdown(selectedBreakdownCat);
    }
  }

  let expenseListOpen = false;

  function toggleExpenseList(){
    expenseListOpen = !expenseListOpen;
    const list = document.getElementById('expenseList');
    const toggle = document.getElementById('expenseListToggle');
    list.style.display = expenseListOpen ? 'flex' : 'none';
    toggle.textContent = expenseListOpen ? '▲ 收埋記錄' : '▼ 睇返/編輯 呢個月記錄';
  }

  function renderExpenseList(monthExpenses){
    const list = document.getElementById('expenseList');
    const empty = document.getElementById('expenseListEmpty');
    const toggle = document.getElementById('expenseListToggle');
    list.innerHTML = '';

    if(monthExpenses.length === 0){
      toggle.style.display = 'none';
      list.style.display = 'none';
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';
    toggle.style.display = 'block';

    const sorted = [...monthExpenses].sort((a,b) => new Date(b.ts) - new Date(a.ts));
    const fmt = new Intl.DateTimeFormat('zh-Hant', { month:'numeric', day:'numeric' });

    sorted.forEach(e => {
      const li = document.createElement('li');
      li.className = 'log-item expense-item';
      const noteText = e.note ? escapeHtml(e.note) : '';
      li.innerHTML = `
        <div class="expense-main">
          <span class="expense-cat">${escapeHtml(e.category)}</span>
          <span class="expense-amt">$${e.amount.toLocaleString()}</span>
          ${noteText ? ' · ' + noteText : ''}
          <div class="log-date">${fmt.format(new Date(e.ts))}</div>
        </div>
        <div class="expense-actions">
          <span onclick="editExpense('${e.id}')">✎ 改</span>
          <span onclick="quickDeleteExpense('${e.id}')">🗑</span>
        </div>
      `;
      list.appendChild(li);
    });

    list.style.display = expenseListOpen ? 'flex' : 'none';
    toggle.textContent = expenseListOpen ? '▲ 收埋記錄' : '▼ 睇返/編輯 呢個月記錄';
  }

  async function quickDeleteExpense(id){
    expenses = expenses.filter(e => e.id !== id);
    await persistExpenses();
    renderDashboard();
    showToast('刪除咗喇');
  }

  function setBar(barId, amtId, value, max, maxHeight){
    const h = value > 0 ? Math.max(6, (value/max) * maxHeight) : 6;
    document.getElementById(barId).style.height = h + 'px';
    document.getElementById(amtId).textContent = value.toLocaleString();
  }

  const BAR_COL_INDEX = { '食':0, '行':1, '買野':2, '定期':3, '其他':4, '信用卡':5 };

  function showBreakdown(cat){
    selectedBreakdownCat = cat;

    document.querySelectorAll('#barsWrap .bar-col').forEach((el, idx) => {
      el.classList.toggle('selected', idx === BAR_COL_INDEX[cat]);
    });

    const items = currentMonthExpenses.filter(e => e.category === cat);
    const panel = document.getElementById('breakdownPanel');
    const title = document.getElementById('breakdownTitle');
    const list = document.getElementById('breakdownList');

    panel.style.display = 'block';
    title.textContent = `${cat} 分佈`;
    list.innerHTML = '';

    if(items.length === 0){
      list.innerHTML = '<div class="breakdown-empty">呢個分類仲未有記錄</div>';
      return;
    }

    const byNote = {};
    items.forEach(e => {
      const key = e.note && e.note.trim() ? e.note.trim() : '(未有備註)';
      byNote[key] = (byNote[key] || 0) + e.amount;
    });

    const sorted = Object.entries(byNote).sort((a,b) => b[1] - a[1]);
    const max = sorted[0][1];

    sorted.forEach(([note, amt]) => {
      const pct = Math.max(4, (amt / max) * 100);
      const row = document.createElement('div');
      row.className = 'breakdown-row';
      row.innerHTML = `
        <span class="bd-note">${escapeHtml(note)}</span>
        <span class="bd-bar-track"><span class="bd-bar-fill" style="width:${pct}%;"></span></span>
        <span class="bd-amt">$${amt.toLocaleString()}</span>
      `;
      list.appendChild(row);
    });
  }

  function closeBreakdown(){
    selectedBreakdownCat = null;
    document.getElementById('breakdownPanel').style.display = 'none';
    document.querySelectorAll('#barsWrap .bar-col').forEach(el => el.classList.remove('selected'));
  }

  async function addLog(){
    const input = document.getElementById('logInput');
    const text = input.value.trim();
    if(!text) return;
    const chosenDate = document.getElementById('logDateInput').value || todayISO();
    const ts = chosenDate === todayISO()
      ? new Date().toISOString()
      : new Date(chosenDate + 'T12:00:00').toISOString();
    logs.unshift({
      id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
      text,
      ts: ts
    });
    input.value = '';
    document.getElementById('logDateInput').value = todayISO();
    await persistLogs();
    renderLog();
    showToast('記低咗喇 ✓');
  }

  async function deleteLog(id){
    logs = logs.filter(l => l.id !== id);
    await persistLogs();
    refreshLogViews();
  }

  let editingLogId = null;

  function refreshLogViews(){
    renderLog();
    if(logViewMode === 'calendar') renderCalendar();
  }

  function startEditLog(id){
    editingLogId = id;
    refreshLogViews();
  }

  function cancelEditLog(){
    editingLogId = null;
    refreshLogViews();
  }

  async function saveEditLog(id){
    const textEl = document.getElementById('editLogText-' + id);
    const dateEl = document.getElementById('editLogDate-' + id);
    const text = textEl.value.trim();
    if(!text){ showToast('打返啲字先啦'); return; }
    const item = logs.find(l => l.id === id);
    if(item){
      item.text = text;
      const chosenDate = dateEl.value || todayISO();
      item.ts = chosenDate === new Date(item.ts).toISOString().slice(0,10)
        ? item.ts
        : new Date(chosenDate + 'T12:00:00').toISOString();
    }
    editingLogId = null;
    await persistLogs();
    refreshLogViews();
    showToast('更新咗喇 ✓');
  }

  let pastLogOpen = false;

  function togglePastLog(){
    pastLogOpen = !pastLogOpen;
    renderLog();
  }

  const logItemFmt = new Intl.DateTimeFormat('zh-Hant', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' });

  function buildLogItem(l){
    const li = document.createElement('li');
    const dateStr = logItemFmt.format(new Date(l.ts));

    if(editingLogId === l.id){
      li.className = 'log-item log-edit';
      const isoDate = new Date(l.ts).toISOString().slice(0,10);
      li.innerHTML = `
        <input type="date" id="editLogDate-${l.id}" class="log-date-input" value="${isoDate}">
        <input type="text" id="editLogText-${l.id}" value="${escapeHtml(l.text)}" class="log-edit-input">
        <div class="log-edit-actions">
          <button class="btn btn-save" onclick="saveEditLog('${l.id}')">更新</button>
          <button class="btn btn-cancel" onclick="cancelEditLog()">算了</button>
        </div>
      `;
    } else {
      li.className = 'log-item';
      li.innerHTML = `<div class="log-date">${dateStr}</div><div>${escapeHtml(l.text)}</div><div class="log-actions"><span class="log-del" onclick="startEditLog('${l.id}')">✎ 改</span><span class="log-del" onclick="deleteLog('${l.id}')">刪除</span></div>`;
    }
    return li;
  }

  function renderLog(){
    const list = document.getElementById('logList');
    const empty = document.getElementById('logEmpty');
    const pastToggle = document.getElementById('pastToggle');
    const pastList = document.getElementById('pastLogList');

    list.innerHTML = '';
    pastList.innerHTML = '';

    if(logs.length === 0){
      empty.style.display = 'block';
      pastToggle.style.display = 'none';
      pastList.style.display = 'none';
      return;
    }
    empty.style.display = 'none';

    const recent = logs.slice(0, 5);
    const past = logs.slice(5);

    const buildItem = buildLogItem;

    if(recent.length === 0){
      const li = document.createElement('li');
      li.className = 'empty-note';
      li.style.padding = '4px';
      li.textContent = '仲未有記錄';
      list.appendChild(li);
    } else {
      recent.forEach(l => list.appendChild(buildItem(l)));
    }

    if(past.length > 0){
      pastToggle.style.display = 'block';
      pastToggle.textContent = pastLogOpen ? `▲ 收埋過去 ${past.length} 條記錄` : `▼ 睇返過去 ${past.length} 條記錄`;
      pastList.style.display = pastLogOpen ? 'flex' : 'none';
      if(pastLogOpen){
        past.forEach(l => pastList.appendChild(buildItem(l)));
      }
    } else {
      pastToggle.style.display = 'none';
      pastList.style.display = 'none';
    }
  }

  let logViewMode = 'list';
  let calMonthOffset = 0;
  let calSelectedDate = null;

  function switchLogView(mode){
    logViewMode = mode;
    document.getElementById('viewBtnList').classList.toggle('active', mode === 'list');
    document.getElementById('viewBtnCal').classList.toggle('active', mode === 'calendar');
    document.getElementById('logListView').style.display = mode === 'list' ? 'block' : 'none';
    document.getElementById('logCalendarView').style.display = mode === 'calendar' ? 'block' : 'none';
    if(mode === 'calendar'){
      calSelectedDate = todayISO();
      renderCalendar();
    }
  }

  function changeCalMonth(delta){
    if(calMonthOffset + delta > 0) return;
    calMonthOffset += delta;
    calSelectedDate = null;
    renderCalendar();
  }

  function dateKey(d){
    const off = d.getTimezoneOffset();
    return new Date(d.getTime() - off*60000).toISOString().slice(0,10);
  }

  function renderCalendar(){
    const target = targetDateForOffset(calMonthOffset);
    const year = target.getFullYear();
    const month = target.getMonth();

    document.getElementById('calMonthCurrent').textContent =
      new Intl.DateTimeFormat('zh-Hant', { year:'numeric', month:'long' }).format(target);
    document.getElementById('calNextArrow').classList.toggle('disabled', calMonthOffset === 0);

    const entriesByDate = {};
    logs.forEach(l => {
      const key = dateKey(new Date(l.ts));
      (entriesByDate[key] = entriesByDate[key] || []).push(l);
    });

    const grid = document.getElementById('calGrid');
    grid.innerHTML = '';

    ['日','一','二','三','四','五','六'].forEach(d => {
      const el = document.createElement('div');
      el.className = 'cal-dow';
      el.textContent = d;
      grid.appendChild(el);
    });

    const firstDay = new Date(year, month, 1);
    const startWeekday = firstDay.getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const todayKey = todayISO();

    for(let i = 0; i < startWeekday; i++){
      const el = document.createElement('div');
      el.className = 'cal-day empty';
      grid.appendChild(el);
    }

    for(let d = 1; d <= daysInMonth; d++){
      const cellDate = new Date(year, month, d, 12);
      const key = dateKey(cellDate);
      const hasEntries = !!entriesByDate[key];
      const el = document.createElement('div');
      el.className = 'cal-day' + (hasEntries ? ' has-entry' : '') + (key === todayKey ? ' today' : '') + (key === calSelectedDate ? ' selected' : '');
      el.innerHTML = `${d}${hasEntries ? '<div class="dot"></div>' : ''}`;
      el.onclick = () => {
        calSelectedDate = key;
        renderCalendar();
      };
      grid.appendChild(el);
    }

    renderCalDayList(entriesByDate);
  }

  function renderCalDayList(entriesByDate){
    const list = document.getElementById('calDayList');
    const empty = document.getElementById('calDayEmpty');
    list.innerHTML = '';

    if(!calSelectedDate){
      empty.style.display = 'block';
      return;
    }
    const items = entriesByDate[calSelectedDate] || [];
    if(items.length === 0){
      empty.style.display = 'block';
      empty.textContent = `${calSelectedDate} 冇記錄`;
      return;
    }
    empty.style.display = 'none';
    items.forEach(l => list.appendChild(buildLogItem(l)));
  }

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  let toastTimer;
  function showToast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
  }

  document.getElementById('logInput').addEventListener('keydown', (e) => {
    if(e.key === 'Enter') addLog();
  });
  document.getElementById('amountInput').addEventListener('keydown', (e) => {
    if(e.key === 'Enter') saveExpense();
  });
  document.getElementById('upcomingInput').addEventListener('keydown', (e) => {
    if(e.key === 'Enter') addUpcoming();
  });

  loadData().then(() => watchRemoteSync());
</script>

</body>
